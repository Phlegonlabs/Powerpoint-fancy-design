  <text x="792" y="234" fill="#101828" style="font:700 32px Georgia, serif;"><tspan x="792" dy="0">Modular Construction Systems</tspan></text>
  <text x="792" y="286" fill="#344054" style="font:400 18px 'Segoe UI', Arial, sans-serif;"><tspan x="792" dy="0">Strategy slides using diagonal blocks,</tspan><tspan x="792" dy="28">bold anchors, and a visual rhythm</tspan><tspan x="792" dy="28">that feels structural and direct.</tspan></text>
  <text x="792" y="392" fill="#667085" style="font:700 12px 'Consolas', 'Courier New', monospace; letter-spacing:1.4px;">BEST FOR</text>
