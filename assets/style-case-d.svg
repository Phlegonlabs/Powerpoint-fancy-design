  <circle cx="1108" cy="84" r="96" fill="#DCE4F3"/>
  <circle cx="92" cy="454" r="126" fill="#ECE2D4"/>

  <text x="58" y="58" fill="#667085" style="font:700 14px 'Consolas', 'Courier New', monospace; letter-spacing:1.8px;">STYLE D</text>
  <text x="58" y="94" fill="#101828" style="font:700 34px Georgia, serif;">Bauhaus Geometry</text>
  <text x="58" y="122" fill="#475467" style="font:400 18px 'Segoe UI', Arial, sans-serif;">Poster tension built from hard geometry</text>

