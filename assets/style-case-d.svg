      <text x="466" y="284" fill="#6A6560" style="font:600 16px 'Segoe UI', Arial, sans-serif; letter-spacing:0.6px;"><tspan x="466" dy="0">BUILD FAST</tspan><tspan x="466" dy="24">Geometry as hierarchy</tspan></text>
    
