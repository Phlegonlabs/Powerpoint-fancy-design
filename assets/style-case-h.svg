  <text x="792" y="286" fill="#344054" style="font:400 18px 'Segoe UI', Arial, sans-serif;"><tspan x="792" dy="0">Cinematic reveal slides using a dark</tspan><tspan x="792" dy="28">horizon line, scanline detail, and</tspan><tspan x="792" dy="28">cool futuristic restraint.</tspan></text>
