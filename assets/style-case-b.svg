  <text x="792" y="192" fill="#667085" style="font:700 12px 'Consolas', 'Courier New', monospace; letter-spacing:1.4px;">CASE EXAMPLE</text>
  <text x="792" y="234" fill="#101828" style="font:700 32px Georgia, serif;"><tspan x="792" dy="0">Tea House Brand Philosophy</tspan></text>
  <text x="792" y="286" fill="#344054" style="font:400 18px 'Segoe UI', Arial, sans-serif;"><tspan x="792" dy="0">A quiet founder story deck with one</tspan><tspan x="792" dy="28">ink-like circle, one horizontal rule,</tspan><tspan x="792" dy="28">and generous open space.</tspan></text>
  <text x="792" y="392" fill="#667085" style="font:700 12px 'Consolas', 'Courier New', monospace; letter-spacing:1.4px;">BEST FOR</text>
  <text x="792" y="418" fill="#101828" style="font:600 18px 'Segoe UI', Arial, sans-serif;">Brand values, exhibitions, culture</text>

