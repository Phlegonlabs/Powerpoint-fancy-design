      <stop offset="1" stop-color="#E8EDF7"/>
    </linearGradient>
    <filter id="shadow-b" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#101828" flood-opacity="0.10"/>
    </filter>
  </defs>

  <rect width="1240" height="520" rx="34" fill="url(#bg-b)"/>
  <circle cx="1108" cy="84" r="96" fill="#DCE4F3"/>
  <circle cx="92" cy="454" r="126" fill="#ECE2D4"/>

  <text x="58" y="58" fill="#667085" style="font:700 14px 'Consolas', 'Courier New', monospace; letter-spacing:1.8px;">STYLE B</text>
  <text x="58" y="94" fill="#101828" style="font:700 34px Georgia, serif;">East Asian Minimalism</text>
  <text x="58" y="122" fill="#475467" style="font:400 18px 'Segoe UI', Arial, sans-serif;">Large silence and one meditative focal form</text>

  <g filter="url(#shadow-b)">
    <rect x="58" y="146" width="664" height="328" rx="34" fill="#FFFFFF" fill-opacity="0.9"/>
    
      <rect x="84" y="98" width="612" height="324" rx="26" fill="#F5F0E6"/>
      <circle cx="246" cy="220" r="72" fill="#2D3A5C"/>
      <line x1="146" y1="332" x2="642" y2="332" stroke="#C45A3C" stroke-width="2"/>
      <text x="474" y="236" fill="#6A6560" style="font:600 18px 'Segoe UI', Arial, sans-serif; letter-spacing:0.6px;"><tspan x="474" dy="0">QUIET CRAFT</tspan><tspan x="474" dy="26">One form, one idea</tspan></text>
    
  </g>

