<svg width="1600" height="1160" viewBox="0 0 1600 1160" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="pageBg" x1="0" y1="0" x2="1600" y2="1160" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F7F4EE"/>
      <stop offset="1" stop-color="#EAEFF8"/>
    </linearGradient>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#101828" flood-opacity="0.08"/>
    </filter>
    <style>
      .title { font: 700 46px 'Segoe UI', Arial, sans-serif; fill: #101828; }
      .subtitle { font: 400 20px 'Segoe UI', Arial, sans-serif; fill: #475467; }
      .thumb-label { font: 700 18px 'Segoe UI', Arial, sans-serif; fill: #101828; }
      .thumb-sub { font: 400 13px 'Segoe UI', Arial, sans-serif; fill: #475467; }
      .cap { font: 700 11px 'Consolas', 'Courier New', monospace; letter-spacing: 1.2px; fill: #667085; }
    </style>
  </defs>

  <rect width="1600" height="1160" fill="url(#pageBg)"/>
  <circle cx="1450" cy="140" r="170" fill="#DCE7F7"/>
  <circle cx="150" cy="1060" r="220" fill="#ECE2D4"/>

  <text x="92" y="96" class="title">Style Sample Gallery</text>
  <text x="92" y="132" class="subtitle">Illustrative preview boards showing the kind of slide each style tends to produce in the README.</text>

  <!-- A -->
  <g transform="translate(92 184)" filter="url(#cardShadow)">
    <rect width="270" height="290" rx="24" fill="#FFFFFF"/>
    <rect x="20" y="20" width="230" height="129" rx="14" fill="#F0EBE2"/>
    <line x1="36" y1="42" x2="188" y2="42" stroke="#B85038" stroke-width="4"/>
    <text x="36" y="84" style="font:700 40px Georgia, serif; fill:#22242C;">Growth</text>
    <text x="36" y="120" style="font:700 56px Georgia, serif; fill:#22242C;">48%</text>
    <line x1="36" y1="102" x2="214" y2="102" stroke="#2A2A30" stroke-opacity="0.12"/>
    <line x1="20" y1="20" x2="20" y2="34" stroke="#2A2A30" stroke-opacity="0.3"/>
    <line x1="20" y1="20" x2="34" y2="20" stroke="#2A2A30" stroke-opacity="0.3"/>
    <line x1="250" y1="20" x2="236" y2="20" stroke="#2A2A30" stroke-opacity="0.3"/>
    <line x1="250" y1="20" x2="250" y2="34" stroke="#2A2A30" stroke-opacity="0.3"/>
    <text x="20" y="178" class="cap">STYLE A</text>
    <text x="20" y="204" class="thumb-label">Swiss International</text>
    <text x="20" y="228" class="thumb-sub">Editorial, grid-first, restrained, data-focused.</text>
  </g>

  <!-- B -->
  <g transform="translate(394 184)" filter="url(#cardShadow)">
    <rect width="270" height="290" rx="24" fill="#FFFFFF"/>
    <rect x="20" y="20" width="230" height="129" rx="14" fill="#F5F0E6"/>
    <circle cx="92" cy="78" r="28" fill="#2D3A5C"/>
    <line x1="34" y1="122" x2="220" y2="122" stroke="#C45A3C" stroke-width="2"/>
    <text x="24" y="178" class="cap">STYLE B</text>
    <text x="24" y="204" class="thumb-label">East Asian Minimalism</text>
    <text x="24" y="228" class="thumb-sub">Quiet negative space with a single meditative focal form.</text>
  </g>

  <!-- C -->
  <g transform="translate(696 184)" filter="url(#cardShadow)">
    <rect width="270" height="290" rx="24" fill="#FFFFFF"/>
    <rect x="20" y="20" width="230" height="129" rx="14" fill="#F2EDE0"/>
    <circle cx="96" cy="82" r="36" fill="#E8456B" fill-opacity="0.78"/>
    <circle cx="132" cy="88" r="36" fill="#1A5C5A" fill-opacity="0.78"/>
    <rect x="36" y="110" width="92" height="10" fill="#1A5C5A"/>
    <rect x="40" y="113" width="92" height="10" fill="#E8456B" fill-opacity="0.32"/>
    <rect x="154" y="40" width="38" height="38" fill="#1A5C5A"/>
    <text x="20" y="178" class="cap">STYLE C</text>
    <text x="20" y="204" class="thumb-label">Risograph Print</text>
    <text x="20" y="228" class="thumb-sub">Two inks, overprint collisions, workshop-made energy.</text>
  </g>

  <!-- D -->
  <g transform="translate(998 184)" filter="url(#cardShadow)">
    <rect width="270" height="290" rx="24" fill="#FFFFFF"/>
    <rect x="20" y="20" width="230" height="129" rx="14" fill="#F2EDE4"/>
    <polygon points="26,132 162,24 230,24 94,132" fill="#D4C8A8"/>
    <polygon points="118,136 250,48 250,136" fill="#8A3A2A"/>
    <rect x="38" y="40" width="72" height="16" fill="#1A1A1A"/>
    <text x="20" y="178" class="cap">STYLE D</text>
    <text x="20" y="204" class="thumb-label">Bauhaus Geometry</text>
    <text x="20" y="228" class="thumb-sub">Diagonal blocks, structural contrast, poster logic.</text>
  </g>

  <!-- E -->
  <g transform="translate(1300 184)" filter="url(#cardShadow)">
    <rect width="270" height="290" rx="24" fill="#FFFFFF"/>
    <rect x="20" y="20" width="230" height="129" rx="14" fill="#F2ECE2"/>
    <path d="M62 116C30 96 34 52 86 40C136 28 188 42 196 76C204 110 164 132 118 126C90 122 74 120 62 116Z" fill="#A07850"/>
    <path d="M130 46C154 40 182 50 194 70C206 92 198 118 172 128C146 138 124 128 112 114C96 96 98 74 106 60C112 52 120 48 130 46Z" fill="#6A8A7A" fill-opacity="0.85"/>
    <path d="M38 126C72 108 110 108 146 126" stroke="#3A3530" stroke-opacity="0.35" stroke-width="4" stroke-linecap="round"/>
    <text x="20" y="178" class="cap">STYLE E</text>
    <text x="20" y="204" class="thumb-label">Organic Handcrafted</text>
    <text x="20" y="228" class="thumb-sub">Soft blobs, tactile brush energy, warm human tone.</text>
  </g>

  <!-- F -->
  <g transform="translate(92 524)" filter="url(#cardShadow)">
    <rect width="270" height="290" rx="24" fill="#FFFFFF"/>
    <rect x="20" y="20" width="230" height="129" rx="14" fill="#0E1118"/>
    <path d="M135 32 L182 118 L88 118 Z" stroke="#C4A265" stroke-width="1.2" fill="none"/>
    <line x1="135" y1="28" x2="135" y2="126" stroke="#C4A265" stroke-width="1"/>
    <line x1="72" y1="124" x2="198" y2="124" stroke="#C4A265" stroke-width="1"/>
    <line x1="56" y1="42" x2="214" y2="42" stroke="#C4A265" stroke-opacity="0.35"/>
    <text x="20" y="178" class="cap">STYLE F</text>
    <text x="20" y="204" class="thumb-label">Art Deco Luxury</text>
    <text x="20" y="228" class="thumb-sub">Dark symmetry, gold rules, ceremonial premium tone.</text>
  </g>

  <!-- G -->
  <g transform="translate(394 524)" filter="url(#cardShadow)">
    <rect width="270" height="290" rx="24" fill="#FFFFFF"/>
    <rect x="20" y="20" width="230" height="129" rx="14" fill="#F5F0E0"/>
    <rect x="36" y="42" width="116" height="44" fill="#FFE156" stroke="#1A1A1A" stroke-width="4"/>
    <rect x="80" y="78" width="122" height="40" fill="#FF6B6B" stroke="#1A1A1A" stroke-width="4"/>
    <rect x="164" y="34" width="56" height="24" transform="rotate(5 164 34)" fill="#4ECDC4" stroke="#1A1A1A" stroke-width="4"/>
    <text x="20" y="178" class="cap">STYLE G</text>
    <text x="20" y="204" class="thumb-label">Neo Brutalism</text>
    <text x="20" y="228" class="thumb-sub">Thick borders, hard shadows, startup-launch aggression.</text>
  </g>

  <!-- H -->
  <g transform="translate(696 524)" filter="url(#cardShadow)">
    <rect width="270" height="290" rx="24" fill="#FFFFFF"/>
    <rect x="20" y="20" width="230" height="129" rx="14" fill="#0B0D1D"/>
    <line x1="30" y1="132" x2="240" y2="132" stroke="#2A6A8A" stroke-width="1.5"/>
    <line x1="82" y1="48" x2="32" y2="132" stroke="#1A3A5A" stroke-width="1"/>
    <line x1="122" y1="48" x2="86" y2="132" stroke="#1A3A5A" stroke-width="1"/>
    <line x1="162" y1="48" x2="140" y2="132" stroke="#1A3A5A" stroke-width="1"/>
    <line x1="38" y1="118" x2="224" y2="118" stroke="#40E8D0" stroke-opacity="0.75" stroke-width="1.5"/>
    <text x="20" y="178" class="cap">STYLE H</text>
    <text x="20" y="204" class="thumb-label">Retro Futurism</text>
    <text x="20" y="228" class="thumb-sub">Horizon grid, CRT scanline feel, restrained neon sci-fi.</text>
  </g>

  <!-- I -->
  <g transform="translate(998 524)" filter="url(#cardShadow)">
    <rect width="270" height="290" rx="24" fill="#FFFFFF"/>
    <rect x="20" y="20" width="230" height="129" rx="14" fill="#111116"/>
    <text x="34" y="78" style="font:700 32px Georgia, serif; fill:#E8E4DC;">Sharp</text>
    <text x="34" y="112" style="font:700 40px Georgia, serif; fill:#E8E4DC;">Pacing</text>
    <line x1="34" y1="122" x2="214" y2="122" stroke="#A89878" stroke-width="1" stroke-opacity="0.5"/>
    <line x1="34" y1="136" x2="176" y2="136" stroke="#2A2A30" stroke-width="1"/>
    <text x="20" y="178" class="cap">STYLE I</text>
    <text x="20" y="204" class="thumb-label">Dark Editorial</text>
    <text x="20" y="228" class="thumb-sub">Serious typography, dark breathing room, authority.</text>
  </g>

  <!-- J -->
  <g transform="translate(1300 524)" filter="url(#cardShadow)">
    <rect width="270" height="290" rx="24" fill="#FFFFFF"/>
    <rect x="20" y="20" width="230" height="129" rx="14" fill="#FAF5E8"/>
    <circle cx="58" cy="58" r="14" fill="#2EC4B6" stroke="#2A2A2A" stroke-width="2"/>
    <polygon points="186,30 212,82 160,82" fill="#FFD23F" stroke="#2A2A2A" stroke-width="2"/>
    <path d="M36 112 Q52 90 68 112 Q84 134 100 112 Q116 90 132 112" stroke="#FF8A5C" stroke-width="4" fill="none"/>
    <path d="M146 118 L162 102 L178 118 L194 102 L210 118" stroke="#FF6B9D" stroke-width="4" fill="none"/>
    <rect x="114" y="54" width="34" height="34" fill="#4A90D9" stroke="#2A2A2A" stroke-width="2"/>
    <text x="20" y="178" class="cap">STYLE J</text>
    <text x="20" y="204" class="thumb-label">Memphis Pop</text>
    <text x="20" y="228" class="thumb-sub">Bright collisions, scattered shapes, playful rhythm.</text>
  </g>

  <text x="92" y="894" class="subtitle">Use these previews as visual cues in the README before readers choose a template or prompt.</text>
</svg>
